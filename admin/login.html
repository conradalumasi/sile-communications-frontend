<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Sile Communications</title>
    <link rel="icon" href="../images/favicon.ico" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, "Segoe UI", monospace;
        background: linear-gradient(135deg, #0f2b44, #1e3a5f);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .login-card {
        background: white;
        border-radius: 24px;
        width: 100%;
        max-width: 440px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }
      .login-header {
        background: linear-gradient(135deg, #10b981, #059669);
        padding: 40px 30px;
        text-align: center;
        color: white;
      }
      .login-header img {
        width: 70px;
        margin-bottom: 15px;
      }
      .login-header h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      .login-header p {
        font-size: 13px;
        opacity: 0.9;
      }
      .login-form {
        padding: 35px;
      }
      .form-group {
        margin-bottom: 22px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 13px;
        color: #1e293b;
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        font-size: 14px;
      }
      .btn-login {
        width: 100%;
        padding: 14px;
        background: #10b981;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-login:hover {
        background: #059669;
      }
      .error-message {
        background: #fee2e2;
        color: #dc2626;
        padding: 12px;
        border-radius: 10px;
        margin-top: 15px;
        font-size: 13px;
        text-align: center;
        display: none;
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
        display: none;
      }
      .btn-login.loading .spinner {
        display: inline-block;
      }
      .btn-login.loading .btn-text {
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <img
          src="../images/logo.png"
          alt="Logo"
          onerror="this.src = 'https://via.placeholder.com/70'"
        />
        <h1>Admin Login</h1>
        <p>Sign in with your admin account</p>
      </div>
      <div class="login-form">
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="email"
              placeholder="admin@example.com"
              required
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <button type="submit" class="btn-login" id="loginBtn">
            <span class="btn-text">Login to Dashboard</span>
            <span class="spinner"></span>
          </button>
          <div id="errorMsg" class="error-message"></div>
        </form>
      </div>
    </div>

    <script>
      const API_BASE =
        location.hostname === "localhost"
          ? "http://localhost:5000/api"
          : "https://sile-backend.onrender.com/api";

      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const btn = document.getElementById("loginBtn");
          const errorMsg = document.getElementById("errorMsg");
          errorMsg.style.display = "none";
          btn.classList.add("loading");
          btn.disabled = true;

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          try {
            const res = await fetch(`${API_BASE}/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });
            const data = await res.json();
            if (res.ok) {
              // Store token and user
              localStorage.setItem("adminToken", data.token);
              localStorage.setItem("adminUser", JSON.stringify(data.user));
              localStorage.setItem("adminLoggedIn", "true");
              // Optional: check admin role
              if (data.user.role !== "admin") {
                errorMsg.textContent = "You do not have admin privileges.";
                errorMsg.style.display = "block";
                btn.classList.remove("loading");
                btn.disabled = false;
                return;
              }
              window.location.href = "dashboard.html";
            } else {
              errorMsg.textContent = data.error || "Invalid credentials";
              errorMsg.style.display = "block";
            }
          } catch (err) {
            errorMsg.textContent = "Server error. Please try again.";
            errorMsg.style.display = "block";
          } finally {
            btn.classList.remove("loading");
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
